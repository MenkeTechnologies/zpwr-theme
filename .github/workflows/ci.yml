name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y jq libxml2-utils

      - name: Generated theme files are up to date (no drift from palette/schemes.json)
        run: |
          set -euo pipefail
          node scripts/generate.mjs
          if ! git diff --quiet; then
            echo "::error::generated files differ from palette/schemes.json — run 'node scripts/generate.mjs' and commit"
            git --no-pager diff --stat
            exit 1
          fi
          echo "generated theme set is in sync with the palette"

      - name: Validate JSON (every theme + manifests)
        run: |
          set -euo pipefail
          jq -e . vscode/package.json > /dev/null
          jq -e . palette/schemes.json > /dev/null
          for f in vscode/themes/*.json jetbrains/src/main/resources/*.theme.json; do
            jq -e . "$f" > /dev/null
          done
          echo "all JSON valid"

      - name: Validate XML (plugin descriptor + every editor scheme)
        run: |
          set -euo pipefail
          xmllint --noout jetbrains/src/main/resources/META-INF/plugin.xml
          for f in jetbrains/src/main/resources/*.xml; do xmllint --noout "$f"; done
          echo "all XML valid"

      - name: Every theme color value is a valid hex
        run: |
          set -euo pipefail
          bad=$(for f in vscode/themes/*.json; do jq -r '.colors | to_entries[] | .value' "$f"; done \
            | grep -vE '^#[0-9a-fA-F]{6}([0-9a-fA-F]{2})?$' || true)
          if [ -n "$bad" ]; then
            echo "::error::non-hex color values in a VS Code theme:"; echo "$bad"; exit 1
          fi
          echo "all VS Code workbench colors are valid hex"

      - name: Every contributes.themes path exists
        run: |
          set -euo pipefail
          jq -r '.contributes.themes[].path' vscode/package.json | while read -r p; do
            test -f "vscode/${p#./}" || { echo "::error::missing theme file $p"; exit 1; }
          done
          echo "all VS Code theme paths resolve"

      - name: Every JetBrains editorScheme reference resolves
        run: |
          set -euo pipefail
          for f in jetbrains/src/main/resources/*.theme.json; do
            s=$(jq -r '.editorScheme' "$f")
            test -f "jetbrains/src/main/resources${s}" || { echo "::error::missing editor scheme $s"; exit 1; }
          done
          echo "all editorScheme references resolve"

      - name: Theme provider count matches the theme set
        run: |
          set -euo pipefail
          providers=$(grep -c 'themeProvider' jetbrains/src/main/resources/META-INF/plugin.xml)
          vsthemes=$(jq '.contributes.themes | length' vscode/package.json)
          jbthemes=$(ls jetbrains/src/main/resources/*.theme.json | wc -l | tr -d ' ')
          echo "vscode=$vsthemes jetbrains-providers=$providers jetbrains-files=$jbthemes"
          [ "$providers" = "$vsthemes" ] && [ "$providers" = "$jbthemes" ] || { echo "::error::theme count mismatch across editions"; exit 1; }

      - name: plugin.xml <version> matches VS Code version
        run: |
          set -euo pipefail
          xml_ver=$(grep -oE '<version>[^<]+</version>' jetbrains/src/main/resources/META-INF/plugin.xml | head -1 | sed -E 's/<\/?version>//g')
          vsc_ver=$(jq -r '.version' vscode/package.json)
          echo "jetbrains=$xml_ver vscode=$vsc_ver"
          [ "$xml_ver" = "$vsc_ver" ] || { echo "::error::version drift between editions"; exit 1; }

      - name: Build JetBrains plugin zip
        run: |
          set -euo pipefail
          bash jetbrains/build-plugin.sh
          ls jetbrains/build/zpwr-theme-*.zip

      - name: Package VS Code extension (.vsix)
        run: |
          set -euo pipefail
          cd vscode
          npx --yes @vscode/vsce package --no-dependencies -o /tmp/zpwr-cyberpunk-hud.vsix
          test -f /tmp/zpwr-cyberpunk-hud.vsix
